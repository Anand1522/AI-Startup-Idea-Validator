<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🚀 AI Startup Idea Validator</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
width:850px;
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
text-align:center;
color:#38bdf8;
}

textarea{
width:100%;
height:120px;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
resize:none;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#38bdf8;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:10px;
line-height:1.8;
}

.progress{
height:20px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#22c55e;
}

.footer{
margin-top:15px;
text-align:center;
color:#94a3b8;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h2>🚀 AI Startup Idea Validator</h2>

<textarea
id="idea"
placeholder="Enter your startup idea...">
</textarea>

<button onclick="validateIdea()">
Validate Idea
</button>

<div id="result" class="result">
Startup validation results will appear here...
</div>

<div class="footer">
Day 9 • 30 Days 30 AI Websites Challenge
</div>

</div>

<script>

function validateIdea(){

let idea =
document.getElementById("idea").value.trim();

if(idea===""){
alert("Please enter a startup idea.");
return;
}

let score = 50;

if(idea.toLowerCase().includes("ai")) score += 15;
if(idea.toLowerCase().includes("data")) score += 10;
if(idea.toLowerCase().includes("education")) score += 10;
if(idea.toLowerCase().includes("health")) score += 15;

if(score > 100){
score = 100;
}

let demand = "Medium";

if(score >= 80){
demand = "High";
}
else if(score >= 60){
demand = "Good";
}

let competition = "Moderate";

if(score >= 80){
competition = "High";
}

let difficulty = "Medium";

if(score >= 75){
difficulty = "Hard";
}

document.getElementById("result").innerHTML = `

<h3>💡 Startup Idea</h3>
<p>${idea}</p>

<h3>📊 Success Score: ${score}/100</h3>

<div class="progress">
<div class="bar" style="width:${score}%"></div>
</div>

<h3>🎯 Market Demand</h3>
<p>${demand}</p>

<h3>👥 Target Audience</h3>
<p>Students, Professionals, Businesses</p>

<h3>💰 Monetization</h3>
<ul>
<li>Subscription Plans</li>
<li>Premium Features</li>
<li>Advertisements</li>
<li>Enterprise Solutions</li>
</ul>

<h3>⚔ Competition Level</h3>
<p>${competition}</p>

<h3>🛠 Development Difficulty</h3>
<p>${difficulty}</p>

<h3>📈 Suggestions</h3>
<ul>
<li>Validate with real users.</li>
<li>Build MVP first.</li>
<li>Focus on one major problem.</li>
<li>Collect feedback early.</li>
</ul>

`;

}

</script>

</body>
</html>
